# ============================================================================
# 生产环境 Redis 配置文件
# ============================================================================
# 用途：Docker容器中的Redis服务器配置
# 说明：基于Redis 7.x官方最佳实践
# ============================================================================

# ============================================================================
# 网络配置
# ============================================================================

# 绑定地址（生产环境建议绑定内网IP）
bind 0.0.0.0

# 端口配置
port 6379

# 保护模式（生产环境建议关闭，使用密码认证代替）
protected-mode no

# TCP监听队列长度
tcp-backlog 511

# TCP keepalive（秒）
tcp-keepalive 300

# ============================================================================
# 通用配置
# ============================================================================

# 守护进程（Docker环境中不使用）
daemonize no

# 进程ID文件位置
pidfile /var/run/redis.pid

# 日志级别（debug, verbose, notice, warning）
loglevel notice

# 日志文件（Docker环境中输出到stdout/stderr）
logfile ""

# 数据库数量
databases 16

# ============================================================================
# 快照（RDB）配置
# ============================================================================

# RDB持久化配置：在指定时间内有多少次写入操作
# 格式：save <seconds> <changes>
# 以下配置表示：900秒内有1次更改、300秒内有10次更改、60秒内有10000次更改
save 900 1
save 300 10
save 60 10000

# 持久化失败时是否停止写入
stop-writes-on-bgsave-error yes

# 是否压缩RDB文件
rdbcompression yes

# RDB文件校验
rdbchecksum yes

# RDB文件名
dbfilename dump.rdb

# 工作目录
dir /data

# ============================================================================
# 复制配置
# ============================================================================

# 主节点复制ID（自动生成）
replica-serve-stale-data yes

# 从节点只读
replica-read-only yes

# 复制积压缓冲区大小（字节）
repl-backlog-size 1mb

# 复制积压缓冲区释放时间（秒）
repl-backlog-ttl 3600

# 从节点优先级（用于选举）
replica-priority 100

# 最小副本数用于写入
min-replicas-to-write 0
min-replicas-max-lag 10

# ============================================================================
# 安全配置
# ============================================================================

# 访问密码（生产环境必须配置）
# 使用环境变量REDIS_PASSWORD设置
# requirepass ${REDIS_PASSWORD}

# 禁用/重命名危险命令
# 以下命令可以被重命名或禁用以增强安全性
# rename-command CONFIG ""
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command SHUTDOWN SHUTDOWN_XYZ
# rename-command DEBUG ""

# ============================================================================
# 限制配置
# ============================================================================

# 最大客户端连接数
maxclients 10000

# 最大内存限制（字节）
# 默认：2GB，可通过环境变量REDIS_MAX_MEMORY配置
# maxmemory 2147483648

# 内存淘汰策略（maxmemory-policy）
# volatile-lru: 删除设置了过期时间的LRU键
# allkeys-lru: 删除所有键的LRU
# volatile-random: 删除设置了过期时间的随机键
# allkeys-random: 删除所有键的随机
# volatile-ttl: 删除即将过期的键
# noeviction: 不删除任何键，返回错误（默认）
maxmemory-policy volatile-lru

# LRU/LFU算法采样数
maxmemory-samples 5

# 慢日志配置
# 慢日志阈值（微秒），-1表示禁用，0表示记录所有命令
slowlog-log-slower-than 10000

# 慢日志最大长度
slowlog-max-len 128

# 延迟监控阈值（毫秒）
latency-monitor-threshold 100

# ============================================================================
# AOF持久化配置
# ============================================================================

# 是否启用AOF
appendonly yes

# AOF文件名
appendfilename "appendonly.aof"

# AOF同步策略
# always: 每次写入都同步（最安全但最慢）
# everysec: 每秒同步一次（推荐）
# no: 由操作系统决定同步（最快但可能丢失数据）
appendfsync everysec

# AOF重写条件
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF加载时是否截断末尾的损坏数据
aof-load-truncated yes

# AOF使用RDB前缀
aof-use-rdb-preamble yes

# ============================================================================
# 集群配置（可选）
# ============================================================================

# 集群模式开关（默认关闭）
cluster-enabled no

# 集群配置文件
cluster-config-file nodes.conf

# 集群节点超时时间（毫秒）
cluster-node-timeout 15000

# ============================================================================
# 其他配置
# ============================================================================

# 哈希表大小
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# 列表配置
list-max-ziplist-size -2
list-compress-depth 0

# 集合配置
set-max-intset-entries 512

# 有序集合配置
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog配置
hll-sparse-max-bytes 3000

# Stream节点配置
stream-node-max-bytes 4096
stream-node-max-entries 100

# 激活救援阈值
active-rehashing yes

# 客户端输出缓冲区限制
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 查询频率限制
hz 10

# 动态HZ
dynamic-hz yes

# AOF重写保存RDB
aof-rewrite-incremental-fsync yes

# RDB保存增量
rdb-save-incremental-fsync yes
