name: Deploy Pipeline

on:
  push:
    branches:
      - develop
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (optional)'
        required: false
        type: string

jobs:
  pre-deploy-checks:
    name: Pre-Deploy Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint:check

      - name: Run type checking
        run: npm run type-check

      - name: Run tests
        run: npm run test:ci
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          REDIS_URL: ${{ secrets.TEST_REDIS_URL }}
          NODE_ENV: test

      - name: Check coverage gate
        run: npm run coverage:check

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: development
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure environment
        run: |
          echo "DATABASE_URL=${{ secrets.DEV_DATABASE_URL }}" >> $GITHUB_ENV
          echo "REDIS_URL=${{ secrets.DEV_REDIS_URL }}" >> $GITHUB_ENV
          echo "NEXTAUTH_SECRET=${{ secrets.DEV_NEXTAUTH_SECRET }}" >> $GITHUB_ENV

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build

      # [PLACEHOLDER] 替换为实际部署命令
      - name: Deploy to development [PLACEHOLDER]
        id: deploy
        run: |
          echo "::warning title=Placeholder::此步骤为占位符，请替换为实际部署命令"
          echo "::set-output name=url::${{ secrets.DEV_URL }}"
        continue-on-error: false

      - name: Health check
        run: |
          sleep 15
          DEV_URL="${{ secrets.DEV_URL }}"
          response=$(curl -s -o /dev/null -w "%{http_code}" "${DEV_URL}/api/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "::error title=Health Check Failed::Health check returned $response"
            exit 1
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure environment
        run: |
          echo "DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}" >> $GITHUB_ENV
          echo "REDIS_URL=${{ secrets.STAGING_REDIS_URL }}" >> $GITHUB_ENV
          echo "NEXTAUTH_SECRET=${{ secrets.STAGING_NEXTAUTH_SECRET }}" >> $GITHUB_ENV

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build

      # [PLACEHOLDER] 替换为实际部署命令
      - name: Deploy to staging [PLACEHOLDER]
        id: deploy
        run: |
          echo "::warning title=Placeholder::此步骤为占位符，请替换为实际部署命令"
          echo "::set-output name=url::${{ secrets.STAGING_URL }}"
        continue-on-error: false

      - name: Health check
        run: |
          sleep 15
          STAGING_URL="${{ secrets.STAGING_URL }}"
          response=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "::error title=Health Check Failed::Health check returned $response"
            exit 1
          fi

      - name: Run smoke tests
        run: npm run test:e2e:ci -- --grep "Smoke Test"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure environment
        run: |
          echo "DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}" >> $GITHUB_ENV
          echo "REDIS_URL=${{ secrets.PROD_REDIS_URL }}" >> $GITHUB_ENV
          echo "NEXTAUTH_SECRET=${{ secrets.PROD_NEXTAUTH_SECRET }}" >> $GITHUB_ENV
          echo "ZHIPU_API_KEY=${{ secrets.PROD_ZHIPU_API_KEY }}" >> $GITHUB_ENV
          echo "DEEPSEEK_API_KEY=${{ secrets.PROD_DEEPSEEK_API_KEY }}" >> $GITHUB_ENV

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build

      - name: Create database backup (pre-migration)
        run: |
          timestamp=$(date +%Y%m%d_%H%M%S)
          backup_file="backup_prod_${timestamp}.sql"
          PGPASSWORD=${{ secrets.PG_PASSWORD }} pg_dump \
            -h ${{ secrets.PG_HOST }} \
            -U ${{ secrets.PG_USER }} \
            -d ${{ secrets.PG_DATABASE }} \
            > $backup_file
          echo "::notice title=Backup::Pre-migration backup created: $backup_file"
        continue-on-error: false

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      # [PLACEHOLDER] 此步骤需替换为真实部署指令（SSH/rsync/Docker/k8s 等）
      - name: Deploy to production [PLACEHOLDER]
        id: deploy
        run: |
          echo "::warning title=Placeholder::此步骤为占位符，请替换为实际部署命令"
          echo "::set-output name=url::${{ secrets.PROD_URL }}"
        continue-on-error: false

      - name: Health check
        run: |
          sleep 15
          PROD_URL="${{ secrets.PROD_URL }}"
          response=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}/api/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "::error title=Health Check Failed::Health check returned $response for ${PROD_URL}"
            exit 1
          fi
          echo "::notice title=Health Check::OK - ${PROD_URL}/api/health returned 200"

      - name: Run smoke tests
        run: npm run test:e2e:ci -- --grep "Smoke Test"

      - name: Notify deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '✅ Production deployment successful! Version: ${{ github.ref_name }}'
            })

      - name: Notify deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '❌ Production deployment failed! Please check the logs for details.'
            })
