# Logstash 错误日志处理管道
# 专门处理错误类型日志

input {
  # 从主管道接收错误日志
  pipeline {
    address => "unix:///tmp/logstash-error.sock"
    type => "error-logs"
  }
}

filter {
  # 解析 JSON 格式的日志
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "json_data"
      remove_field => ["message"]
    }
  }

  # 提取时间戳
  date {
    match => ["timestamp", "ISO8601", "UNIX", "UNIX_MS"]
    target => "@timestamp"
  }

  # 提取日志级别
  if [json_data][level] {
    mutate {
      add_field => { "log_level" => "%{[json_data][level]}" }
      uppercase => ["log_level"]
    }
  }

  # 提取用户信息
  if [json_data][context][userId] {
    mutate {
      add_field => { "user_id" => "%{[json_data][context][userId]}" }
    }
  }

  # 提取案件信息
  if [json_data][context][caseId] {
    mutate {
      add_field => { "case_id" => "%{[json_data][context][caseId]}" }
    }
  }

  # 提取请求 ID
  if [json_data][context][requestId] {
    mutate {
      add_field => { "request_id" => "%{[json_data][context][requestId]}" }
    }
  }

  # 处理错误堆栈跟踪
  if [json_data][error] {
    if [json_data][error][stack] {
      mutate {
        add_field => { "error_stack" => "%{[json_data][error][stack]}" }
      }
    }
    if [json_data][error][message] {
      mutate {
        add_field => { "error_message" => "%{[json_data][error][message]}" }
      }
    }
  }

  # 提取错误类型
  if [json_data][context][errorType] {
    mutate {
      add_field => { "error_type" => "%{[json_data][context][errorType]}" }
    }
  }

  # 提取严重程度
  if [json_data][context][severity] {
    mutate {
      add_field => { "error_severity" => "%{[json_data][context][severity]}" }
      uppercase => ["error_severity"]
    }
  }

  # 提取 Agent 信息
  if [json_data][context][agentName] {
    mutate {
      add_field => { "agent_name" => "%{[json_data][context][agentName]}" }
    }
  }

  # 提取任务类型
  if [json_data][context][taskType] {
    mutate {
      add_field => { "task_type" => "%{[json_data][context][taskType]}" }
    }
  }

  # 脱敏处理：移除敏感字段
  mutate {
    remove_field => ["json_data"]
  }

  # 添加错误标签
  mutate {
    add_tag => ["error", "error-log"]
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:localhost:9200}"]
    index => "logs-error-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:}"
    ssl => ${ELASTICSEARCH_SSL:false}
    ssl_certificate_verification => ${ELASTICSEARCH_SSL_VERIFY:true}
  }

  # 发送告警（严重错误）
  if [error_severity] == "CRITICAL" or [error_severity] == "HIGH" {
    http {
      url => "${ALERTMANAGER_WEBHOOK_URL:http://localhost:9093/api/v1/alerts}"
      http_method => "post"
      format => "json"
      mapping => {
        "receiver" => "logstash-error"
        "status" => "firing"
        "alerts" => [[
          {
            "labels" => {
              "alertname" => "CriticalError"
              "severity" => "%{error_severity}"
              "error_type" => "%{error_type}"
              "environment" => "%{environment}"
              "application" => "%{application}"
            },
            "annotations" => {
              "summary" => "Critical error detected: %{error_message}"
              "description" => "Error: %{error_message}\nType: %{error_type}\nSeverity: %{error_severity}\nUser: %{user_id}\nCase: %{case_id}"
            }
          }
        ]]
      }
    }
  }

  # 调试输出（开发环境）
  # stdout { codec => rubydebug }
}
