# Logstash 操作日志处理管道
# 专门处理操作类型日志

input {
  # 从主管道接收操作日志
  pipeline {
    address => "unix:///tmp/logstash-action.sock"
    type => "action-logs"
  }
}

filter {
  # 解析 JSON 格式的日志
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "json_data"
      remove_field => ["message"]
    }
  }

  # 提取时间戳
  date {
    match => ["timestamp", "ISO8601", "UNIX", "UNIX_MS"]
    target => "@timestamp"
  }

  # 提取日志级别
  if [json_data][level] {
    mutate {
      add_field => { "log_level" => "%{[json_data][level]}" }
      uppercase => ["log_level"]
    }
  }

  # 提取用户信息
  if [json_data][context][userId] {
    mutate {
      add_field => { "user_id" => "%{[json_data][context][userId]}" }
    }
  }

  # 提取操作类型
  if [json_data][context][actionType] {
    mutate {
      add_field => { "action_type" => "%{[json_data][context][actionType]}" }
      uppercase => ["action_type"]
    }
  }

  # 提取操作分类
  if [json_data][context][actionCategory] {
    mutate {
      add_field => { "action_category" => "%{[json_data][context][actionCategory]}" }
      uppercase => ["action_category"]
    }
  }

  # 提取资源类型
  if [json_data][context][resourceType] {
    mutate {
      add_field => { "resource_type" => "%{[json_data][context][resourceType]}" }
    }
  }

  # 提取资源 ID
  if [json_data][context][resourceId] {
    mutate {
      add_field => { "resource_id" => "%{[json_data][context][resourceId]}" }
    }
  }

  # 提取 IP 地址
  if [json_data][context][ipAddress] {
    mutate {
      add_field => { "ip_address" => "%{[json_data][context][ipAddress]}" }
    }
    # 添加地理位置信息（需要 geoip 插件）
    geoip {
      source => "ip_address"
      target => "geoip"
      fields => ["city_name", "country_name", "location", "continent_name"]
    }
  }

  # 提取 User-Agent
  if [json_data][context][userAgent] {
    mutate {
      add_field => { "user_agent" => "%{[json_data][context][userAgent]}" }
    }
    # 解析 User-Agent
    useragent {
      source => "user_agent"
      target => "ua"
    }
  }

  # 提取请求方法
  if [json_data][context][requestMethod] {
    mutate {
      add_field => { "request_method" => "%{[json_data][context][requestMethod]}" }
      uppercase => ["request_method"]
    }
  }

  # 提取请求路径
  if [json_data][context][requestPath] {
    mutate {
      add_field => { "request_path" => "%{[json_data][context][requestPath]}" }
    }
  }

  # 提取请求参数
  if [json_data][context][requestParams] {
    mutate {
      add_field => { "request_params" => "%{[json_data][context][requestParams]}" }
    }
  }

  # 提取响应状态
  if [json_data][context][responseStatus] {
    mutate {
      add_field => { "response_status" => "%{[json_data][context][responseStatus]}" }
    }
  }

  # 提取执行时间
  if [json_data][context][executionTime] {
    mutate {
      add_field => { "execution_time_ms" => "%{[json_data][context][executionTime]}" }
    }
    # 计算性能等级
    if [execution_time_ms] < 100 {
      mutate {
        add_field => { "performance_tier" => "fast" }
      }
    } else if [execution_time_ms] < 500 {
      mutate {
        add_field => { "performance_tier" => "normal" }
      }
    } else if [execution_time_ms] < 1000 {
      mutate {
        add_field => { "performance_tier" => "slow" }
      }
    } else {
      mutate {
        add_field => { "performance_tier" => "very_slow" }
      }
    }
  }

  # 脱敏处理：移除敏感字段
  mutate {
    remove_field => ["json_data"]
  }

  # 添加操作标签
  mutate {
    add_tag => ["action", "action-log"]
  }

  # 检测异常操作
  if [action_type] == "LOGIN" and [response_status] != 200 {
    mutate {
      add_tag => ["failed-login"]
    }
  }

  if [action_type] =~ /DELETE$/ or [action_type] =~ /BAN$/ {
    mutate {
      add_tag => ["destructive-action"]
    }
  }

  if [execution_time_ms] > 1000 {
    mutate {
      add_tag => ["slow-operation"]
    }
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:localhost:9200}"]
    index => "logs-action-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:}"
    ssl => ${ELASTICSEARCH_SSL:false}
    ssl_certificate_verification => ${ELASTICSEARCH_SSL_VERIFY:true}
  }

  # 发送告警（检测异常操作）
  if "failed-login" in [tags] or "destructive-action" in [tags] {
    http {
      url => "${ALERTMANAGER_WEBHOOK_URL:http://localhost:9093/api/v1/alerts}"
      http_method => "post"
      format => "json"
      mapping => {
        "receiver" => "logstash-action"
        "status" => "firing"
        "alerts" => [[
          {
            "labels" => {
              "alertname" => "SuspiciousAction"
              "action_type" => "%{action_type}"
              "action_category" => "%{action_category}"
              "user_id" => "%{user_id}"
              "environment" => "%{environment}"
              "application" => "%{application}"
            },
            "annotations" => {
              "summary" => "Suspicious action detected: %{action_type}",
              "description" => "Action: %{action_type}\nCategory: %{action_category}\nUser: %{user_id}\nIP: %{ip_address}\nPath: %{request_path}"
            }
          }
        ]]
      }
    }
  }

  # 调试输出（开发环境）
  # stdout { codec => rubydebug }
}
