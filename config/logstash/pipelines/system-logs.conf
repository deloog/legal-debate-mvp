# Logstash 系统日志处理管道
# 专门处理系统类型日志

input {
  # 从主管道接收系统日志
  pipeline {
    address => "unix:///tmp/logstash-system.sock"
    type => "system-logs"
  }
}

filter {
  # 解析 JSON 格式的日志
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "json_data"
      remove_field => ["message"]
    }
  }

  # 提取时间戳
  date {
    match => ["timestamp", "ISO8601", "UNIX", "UNIX_MS"]
    target => "@timestamp"
  }

  # 提取日志级别
  if [json_data][level] {
    mutate {
      add_field => { "log_level" => "%{[json_data][level]}" }
      uppercase => ["log_level"]
    }
  }

  # 提取用户信息
  if [json_data][context][userId] {
    mutate {
      add_field => { "user_id" => "%{[json_data][context][userId]}" }
    }
  }

  # 提取 Agent 信息
  if [json_data][context][agentName] {
    mutate {
      add_field => { "agent_name" => "%{[json_data][context][agentName]}" }
    }
  }

  # 提取任务类型
  if [json_data][context][taskType] {
    mutate {
      add_field => { "task_type" => "%{[json_data][context][taskType]}" }
    }
  }

  # 提取元数据
  if [json_data][metadata] {
    mutate {
      add_field => { "log_metadata" => "%{[json_data][metadata]}" }
    }
  }

  # 脱敏处理：移除敏感字段
  mutate {
    remove_field => ["json_data"]
  }

  # 添加系统标签
  mutate {
    add_tag => ["system", "system-log"]
  }

  # 检测系统级别日志
  if [log_level] == "FATAL" {
    mutate {
      add_tag => ["system-fatal"]
    }
  }

  if [log_level] == "ERROR" {
    mutate {
      add_tag => ["system-error"]
    }
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:localhost:9200}"]
    index => "logs-system-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:}"
    ssl => ${ELASTICSEARCH_SSL:false}
    ssl_certificate_verification => ${ELASTICSEARCH_SSL_VERIFY:true}
  }

  # 发送告警（系统致命错误）
  if "system-fatal" in [tags] {
    http {
      url => "${ALERTMANAGER_WEBHOOK_URL:http://localhost:9093/api/v1/alerts}"
      http_method => "post"
      format => "json"
      mapping => {
        "receiver" => "logstash-system"
        "status" => "firing"
        "alerts" => [[
          {
            "labels" => {
              "alertname" => "SystemFatalError"
              "severity" => "CRITICAL"
              "agent_name" => "%{agent_name}"
              "task_type" => "%{task_type}"
              "environment" => "%{environment}"
              "application" => "%{application}"
            },
            "annotations" => {
              "summary" => "System fatal error detected",
              "description" => "Agent: %{agent_name}\nTask: %{task_type}\nUser: %{user_id}\nLevel: %{log_level}"
            }
          }
        ]]
      }
    }
  }

  # 调试输出（开发环境）
  # stdout { codec => rubydebug }
}
