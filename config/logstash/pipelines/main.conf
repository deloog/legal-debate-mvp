# Logstash 主管道配置
# 用于接收和处理所有日志事件

input {
  # 接收 Filebeat 发送的日志
  beats {
    port => 5044
    type => "main"
    host => "0.0.0.0"
    
    # SSL 配置（可选）
    # ssl => true
    # ssl_certificate => "/etc/logstash/server.crt"
    # ssl_key => "/etc/logstash/server.key"
  }
}

filter {
  # 根据日志类型分发到不同的子管道
  if [log_type] == "error" {
    route {
      pipeline_id => "error-logs"
      uri => "unix:///tmp/logstash-error.sock"
    }
  } else if [log_type] == "action" {
    route {
      pipeline_id => "action-logs"
      uri => "unix:///tmp/logstash-action.sock"
    }
  } else if [log_type] == "system" {
    route {
      pipeline_id => "system-logs"
      uri => "unix:///tmp/logstash-system.sock"
    }
  } else {
    route {
      pipeline_id => "application-logs"
      uri => "unix:///tmp/logstash-application.sock"
    }
  }
}

output {
  # 默认输出到 Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:localhost:9200}"]
    index => "logs-main-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:}"
    ssl => ${ELASTICSEARCH_SSL:false}
    ssl_certificate_verification => ${ELASTICSEARCH_SSL_VERIFY:true}
  }

  # 调试输出（开发环境）
  # stdout { codec => rubydebug }
}
