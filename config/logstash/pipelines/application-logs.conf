# Logstash 应用日志处理管道
# 专门处理应用类型日志

input {
  # 从主管道接收应用日志
  pipeline {
    address => "unix:///tmp/logstash-application.sock"
    type => "application-logs"
  }
}

filter {
  # 解析 JSON 格式的日志
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "json_data"
      remove_field => ["message"]
    }
  }

  # 提取时间戳
  date {
    match => ["timestamp", "ISO8601", "UNIX", "UNIX_MS"]
    target => "@timestamp"
  }

  # 提取日志级别
  if [json_data][level] {
    mutate {
      add_field => { "log_level" => "%{[json_data][level]}" }
      uppercase => ["log_level"]
    }
  }

  # 提取用户信息
  if [json_data][context][userId] {
    mutate {
      add_field => { "user_id" => "%{[json_data][context][userId]}" }
    }
  }

  # 提取案件信息
  if [json_data][context][caseId] {
    mutate {
      add_field => { "case_id" => "%{[json_data][context][caseId]}" }
    }
  }

  # 提取请求 ID
  if [json_data][context][requestId] {
    mutate {
      add_field => { "request_id" => "%{[json_data][context][requestId]}" }
    }
  }

  # 提取 Agent 信息
  if [json_data][context][agentName] {
    mutate {
      add_field => { "agent_name" => "%{[json_data][context][agentName]}" }
    }
  }

  # 提取任务类型
  if [json_data][context][taskType] {
    mutate {
      add_field => { "task_type" => "%{[json_data][context][taskType]}" }
    }
  }

  # 提取错误信息（如果有）
  if [json_data][error] {
    if [json_data][error][message] {
      mutate {
        add_field => { "error_message" => "%{[json_data][error][message]}" }
      }
    }
  }

  # 脱敏处理：移除敏感字段
  mutate {
    remove_field => ["json_data"]
  }

  # 添加应用标签
  mutate {
    add_tag => ["application", "application-log"]
  }

  # 检测应用级别日志
  if [log_level] == "FATAL" or [log_level] == "ERROR" {
    mutate {
      add_tag => ["application-error"]
    }
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:localhost:9200}"]
    index => "logs-application-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:}"
    ssl => ${ELASTICSEARCH_SSL:false}
    ssl_certificate_verification => ${ELASTICSEARCH_SSL_VERIFY:true}
  }

  # 发送告警（应用错误）
  if "application-error" in [tags] and [log_level] == "FATAL" {
    http {
      url => "${ALERTMANAGER_WEBHOOK_URL:http://localhost:9093/api/v1/alerts}"
      http_method => "post"
      format => "json"
      mapping => {
        "receiver" => "logstash-application"
        "status" => "firing"
        "alerts" => [[
          {
            "labels" => {
              "alertname" => "ApplicationFatalError"
              "severity" => "CRITICAL"
              "agent_name" => "%{agent_name}"
              "task_type" => "%{task_type}"
              "environment" => "%{environment}"
              "application" => "%{application}"
            },
            "annotations" => {
              "summary" => "Application fatal error detected",
              "description" => "Error: %{error_message}\nAgent: %{agent_name}\nTask: %{task_type}\nUser: %{user_id}\nCase: %{case_id}"
            }
          }
        ]]
      }
    }
  }

  # 调试输出（开发环境）
  # stdout { codec => rubydebug }
}
